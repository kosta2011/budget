    spring:
      application:
        name: budget
      datasource:
          url: jdbc:mysql://localhost:3306/budget_db?useSSL=false&serverTimezone=UTC
          username: root
          password: ${DB_PASSWORD}
          driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
          maximumPoolSize: 10
          minimumIdle: 5
      jpa:
        hibernate:
          ddl-auto: none
        show-sql: true
        properties:
          hibernate:
            dialect: org.hibernate.dialect.MySQL8Dialect
            format_sql: true
      liquibase:
        enabled: true
        change-log: db/changelog/db.changelog-master.xml
      security:
        basic:
          enabled: false